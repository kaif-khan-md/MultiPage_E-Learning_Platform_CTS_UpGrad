<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- Header -->
    <header class="app-header text-white text-center p-4 sticky-top">
        <h2 class="mb-1">👤 Profile</h2>
        <p class="mb-0 small">Manage your account and track your progress</p>
    </header>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
        <span class="navbar-brand">E-Learning</span>

            <div class="d-flex gap-3">
                <a class="nav-link text-white nav-item-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link text-white nav-item-link" href="courses.html">Courses</a>
                <a class="nav-link text-white nav-item-link" href="quiz.html">Quiz</a>
                <a class="nav-link text-white nav-item-link" href="profile.html">Profile</a>
            </div>
        </div>
    </nav>

    <!-- breadcrumb -->
    <div class="container mt-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="dashboard.html">Home</a></li>
                <li class="breadcrumb-item active">Profile</li>
            </ol>
        </nav>
    </div>

    <!-- main -->
    <main class="container mt-4">

        <section class="card shadow p-4">

        <h4 class="mb-3">👤 User Profile</h4>

        <!-- name input -->
        <div class="mb-3">
            <p><strong>Name:</strong> 
            <span id="displayName" class="badge bg-success"></span>
            </p>

            <input type="text" id="usernameInput" class="form-control" placeholder="Enter your name">

            <button id="nameBtn" class="btn btn-success mt-2" onclick="handleName()">
            Save
            </button>
        </div>

        <hr>

        <!-- completed courses -->
        <h5>📚 Completed Courses</h5>
        <ul id="completedList" class="list-group mb-3"></ul>

        <!-- quiz score -->
        <h5>📊 Last Quiz Score</h5>
        <p id="quizScore" class="fw-bold"></p>

        </section>

    </main>

    <!-- footer -->
    <footer class="bg-dark text-white text-center p-2 mt-auto">
        <p class="mb-0">© 2026 E-learning Platform</p>
    </footer>

    <script src="js/profile.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
