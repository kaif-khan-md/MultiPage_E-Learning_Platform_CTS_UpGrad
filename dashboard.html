<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    <!-- header -->
    <header class="app-header text-white text-center p-4 sticky-top">
        <h2 class="mb-1">📘 E-Learning Platform</h2>
        <p class="mb-0 small">Learn • Practice • Track Progress 🚀</p>
    </header>

    <!-- navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Dashboard</span>

            <div class="d-flex gap-3">
                <a class="nav-link text-white nav-item-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link text-white nav-item-link" href="courses.html">Courses</a>
                <a class="nav-link text-white nav-item-link" href="quiz.html">Quiz</a>
                <a class="nav-link text-white nav-item-link" href="profile.html">Profile</a>
            </div>

        </div>
    </nav>

    <!-- breadcrumb -->
    <div class="container mt-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="dashboard.html">Home</a></li>
                <li class="breadcrumb-item active">Dashboard</li>
            </ol>
        </nav>
    </div>

    <!-- main -->
    <main class="container mt-4 dashboard-grid">

        <section class="card shadow p-3">
        <!-- courses table -->
        <h4 class="mb-3">Courses Overview</h4>

        <table class="table table-hover table-striped">

            <thead class="table-dark">
                <tr>
                    <th>Course</th>
                    <th>Lessons</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="courseTable"></tbody>

        </table>

        </section>

        <!-- progress bar -->
        <section class="card shadow p-3">

        <h4 class="mb-3">Learning Progress</h4>

        <div class="progress" style="height:25px;">
            <div id="progressBarBootstrap"
                class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                style="width:0%">
            </div>
        </div>

        <p id="progressText" class="mt-2 fw-bold"></p>

        </section>

    </main>

    <!-- footer -->
    <footer class="bg-dark text-white text-center p-2 mt-auto">
        <p class="mb-0">© 2026 E-learning Platform</p>
    </footer>

    <script src="js/courses.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
